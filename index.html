<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>BremenAttacker2048</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #231F20; }
      /* 컨테이너를 창 전체로 채우고, 캔버스를 가운데 정렬(레터박스) */
      #unity-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
      /* 캔버스 실제 크기는 JS(resize)가 원본 비율을 유지하며 창에 맞춘다 */
      #unity-canvas { background: #231F20; display: block; }
      #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; }
      #unity-progress-bar-empty { width: 200px; height: 18px; background: #3a3637; border-radius: 9px; overflow: hidden; }
      #unity-progress-bar-full { width: 0%; height: 18px; background: #ffffff; }
      #unity-warning { position: absolute; left: 50%; top: 5%; transform: translate(-50%); background: white; padding: 10px; display: none; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
      </div>
      <div id="unity-warning"></div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // 원본 비율. 이 비율을 유지하며 창에 맞춰 확대/축소(레터박스)한다.
      var aspect = 1920 / 1080;
      function resizeCanvas() {
        var w = window.innerWidth, h = window.innerHeight;
        var targetW = w, targetH = w / aspect;
        if (targetH > h) { targetH = h; targetW = h * aspect; }   // 세로가 넘치면 높이 기준으로 맞춤
        canvas.style.width = targetW + "px";
        canvas.style.height = targetH + "px";
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() { warningBanner.style.display = warningBanner.children.length ? 'block' : 'none'; }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Breman-Attacker_webBuild.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Breman-Attacker_webBuild.data.unityweb",
        frameworkUrl: buildUrl + "/Breman-Attacker_webBuild.framework.js.unityweb",
        codeUrl: buildUrl + "/Breman-Attacker_webBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "BremenAttacker2048",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
